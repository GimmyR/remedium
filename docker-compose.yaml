services:
  db:
    image: postgres:trixie
    container_name: remedium
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - remedium:/var/lib/postgresql
    profiles:
      - prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
      start_interval: 5s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PASSWORD_STRENGTH: ${PASSWORD_STRENGTH}
      JWT_SECRET: ${JWT_SECRET}
    profiles:
      - prod

  api-ci:
    build:
      context: ./api
      dockerfile: Dockerfile.ci
    profiles:
      - ci

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_CLIENT_SIDE_TO_API=${NEXT_PUBLIC_CLIENT_SIDE_TO_API}
    container_name: next-remedium
    ports:
      - "3000:3000"
    profiles:
      - prod

  front-ci:
    build:
      context: ./front
      dockerfile: Dockerfile.ci
    profiles:
      - ci
      
volumes:
  remedium:
